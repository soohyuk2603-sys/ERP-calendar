<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>가구매 진행 캘린더</title><style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#1f2937;font-family:Arial,'Noto Sans KR',sans-serif}.wrap{max-width:1280px;margin:auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.title{font-size:25px;font-weight:800}.nav{display:flex;gap:8px;align-items:center}.nav button{border:1px solid #d7dee8;background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}.month{font-size:18px;font-weight:700;min-width:120px;text-align:center}.calendar{display:grid;grid-template-columns:repeat(7,1fr);background:#dbe2ea;gap:1px;border:1px solid #dbe2ea}.dow,.day{background:#fff}.dow{padding:10px;text-align:center;font-weight:700;color:#64748b}.day{min-height:150px;padding:8px;position:relative}.day.other{background:#f8fafc;color:#a3acb8}.day.today{background:#fff7ed;box-shadow:inset 0 0 0 3px #f97316;z-index:1}.day.today .date{color:#c2410c}.today-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#f97316;color:#fff;font-size:10px;font-weight:800;vertical-align:1px}.date{font-weight:700;margin-bottom:6px}.event{border-left:4px solid #94a3b8;background:#f8fafc;border-radius:5px;padding:5px 7px;margin:4px 0;font-size:12px;line-height:1.4}.event.에이블리{border-color:#60a5fa;background:#eff6ff}.event.카카오{border-color:#eab308;background:#fffbeb}.event.지그재그{border-color:#34d399;background:#ecfdf5}.ch{font-weight:700}.qty{font-weight:800}.updated{font-size:12px;color:#64748b}@media(max-width:800px){.wrap{padding:8px}.day{min-height:115px;padding:4px}.event{font-size:10px}.title{font-size:19px}.today-badge{display:block;width:max-content;margin:3px 0 0}}
</style></head><body><div class='wrap'><div class='top'><div><div class='title'>가구매 진행 캘린더</div><div class='updated' id='updated'></div></div><div class='nav'><button onclick='move(-1)'>&lsaquo;</button><div class='month' id='month'></div><button onclick='move(1)'>&rsaquo;</button><button onclick='today()'>오늘</button></div></div><div class='calendar' id='cal'></div></div><script src='data.js'></script><script>
const data=window.CALENDAR_DATA||{events:[]};let view=new Date();view.setDate(1);const names=['일','월','화','수','목','금','토'];function fmt(n){return Number.isInteger(n)?n:n.toFixed(1)}function keyOf(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function render(){const y=view.getFullYear(),m=view.getMonth();document.getElementById('month').textContent=`${y}년 ${m+1}월`;document.getElementById('updated').textContent=`최근 갱신 ${data.updated_at||'-'}`;const cal=document.getElementById('cal');cal.innerHTML='';names.forEach(x=>cal.insertAdjacentHTML('beforeend',`<div class='dow'>${x}</div>`));const first=new Date(y,m,1),start=new Date(y,m,1-first.getDay()),todayKey=keyOf(new Date());for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=keyOf(d);const ev=data.events.filter(x=>x.date===key),total=ev.reduce((a,x)=>a+Number(x.quantity||0),0);const groups={};ev.forEach(x=>(groups[x.channel]||(groups[x.channel]=[])).push(x));const box=document.createElement('div');box.className='day'+(d.getMonth()!==m?' other':'')+(key===todayKey?' today':'');let html=`<div class='date'>${d.getMonth()+1}/${d.getDate()}(${names[d.getDay()]})${key===todayKey?`<span class='today-badge'>오늘</span>`:''}${total?` <span class='qty'>총 ${fmt(total)}개</span>`:''}</div>`;for(const [ch,items] of Object.entries(groups)){html+=`<div class='event ${ch}'><span class='ch'>${ch}</span>${items.map(x=>`<div>${x.name} - <span class='qty'>${fmt(x.quantity)}개</span></div>`).join('')}</div>`}box.innerHTML=html;cal.appendChild(box)}}function move(n){view.setMonth(view.getMonth()+n);render()}function today(){view=new Date();view.setDate(1);render()}render();
</script></body></html>
