<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>가구매 진행 캘린더</title><style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#1f2937;font-family:Arial,'Noto Sans KR',sans-serif}.wrap{max-width:1680px;min-width:1180px;margin:auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.title{font-size:25px;font-weight:800}.nav{display:flex;gap:8px;align-items:center}.nav button{border:1px solid #d7dee8;background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}.month{font-size:18px;font-weight:700;min-width:120px;text-align:center}.calendar{display:grid;grid-template-columns:repeat(7,minmax(165px,1fr));background:#dbe2ea;gap:1px;border:1px solid #dbe2ea}.dow,.day{background:#fff}.dow{padding:10px;text-align:center;font-weight:700;color:#64748b}.dow.weekend{color:#dc2626}.day{min-height:165px;padding:8px;position:relative}.day.other{background:#f8fafc;color:#a3acb8}.day.today{background:#fff7ed;box-shadow:inset 0 0 0 3px #f97316;z-index:1}.day.today .date{color:#c2410c}.today-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#f97316;color:#fff;font-size:10px;font-weight:800;vertical-align:1px}.date{font-weight:800;margin-bottom:4px}.date.weekend{color:#dc2626}.vendor-summary{display:flex;flex-wrap:wrap;gap:3px 6px;margin:0 0 6px;font-size:11px;color:#475569}.vendor-summary span{background:#f1f5f9;border-radius:999px;padding:2px 6px;font-weight:700}.event{border-left:4px solid #94a3b8;background:#f8fafc;border-radius:5px;padding:5px 7px;margin:4px 0;font-size:12px;line-height:1.35;overflow-wrap:anywhere}.event.에이블리{border-color:#60a5fa;background:#eff6ff}.event.카카오{border-color:#eab308;background:#fffbeb}.event.지그재그{border-color:#34d399;background:#ecfdf5}.ch{font-weight:800}.qty{font-weight:800}.mark{font-weight:800;color:#475569}.updated{font-size:12px;color:#64748b}@media(max-width:1180px){body{overflow-x:auto}.wrap{padding:10px}.day{min-height:140px}.event{font-size:11px}.title{font-size:20px}}
</style></head><body><div class='wrap'><div class='top'><div><div class='title'>가구매 진행 캘린더</div><div class='updated' id='updated'></div></div><div class='nav'><button onclick='move(-1)'>&lsaquo;</button><div class='month' id='month'></div><button onclick='move(1)'>&rsaquo;</button><button onclick='today()'>오늘</button></div></div><div class='calendar' id='cal'></div></div><script src='data.js'></script><script>
const data=window.CALENDAR_DATA||{events:[]};let view=new Date();view.setDate(1);const names=['일','월','화','수','목','금','토'];function fmt(n){return Number.isInteger(n)?n:n.toFixed(1)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function keyOf(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function render(){const y=view.getFullYear(),m=view.getMonth();document.getElementById('month').textContent=`${y}년 ${m+1}월`;document.getElementById('updated').textContent=`최근 갱신 ${data.updated_at||'-'}`;const cal=document.getElementById('cal');cal.innerHTML='';names.forEach((x,i)=>cal.insertAdjacentHTML('beforeend',`<div class='dow ${i===0||i===6?'weekend':''}'>${x}</div>`));const first=new Date(y,m,1),start=new Date(y,m,1-first.getDay()),todayKey=keyOf(new Date());for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=keyOf(d);const ev=data.events.filter(x=>x.date===key),total=ev.reduce((a,x)=>a+Number(x.quantity||0),0);const groups={},vendors={};ev.forEach(x=>{(groups[x.channel]||(groups[x.channel]=[])).push(x);const va=x.vendor_abbr||x.vendor||'미지정';vendors[va]=(vendors[va]||0)+Number(x.quantity||0)});const box=document.createElement('div');box.className='day'+(d.getMonth()!==m?' other':'')+(key===todayKey?' today':'');const weekend=d.getDay()===0||d.getDay()===6;let html=`<div class='date ${weekend?'weekend':''}'>${d.getMonth()+1}/${d.getDate()}${key===todayKey?`<span class='today-badge'>오늘</span>`:''}${total?` <span class='qty'>총 ${fmt(total)}개</span>`:''}</div>`;if(Object.keys(vendors).length){html+=`<div class='vendor-summary'>${Object.entries(vendors).map(([v,q])=>`<span>${esc(v)} ${fmt(q)}개</span>`).join('')}</div>`}for(const [ch,items] of Object.entries(groups)){html+=`<div class='event ${ch}'><span class='ch'>${esc(ch)}</span>${items.map(x=>`<div>${esc(x.name)} - <span class='qty'>${fmt(x.quantity)}개</span>${x.vendor_mark?` <span class='mark'>(${esc(x.vendor_mark)})</span>`:''}</div>`).join('')}</div>`}box.innerHTML=html;cal.appendChild(box)}}function move(n){view.setMonth(view.getMonth()+n);render()}function today(){view=new Date();view.setDate(1);render()}render();
</script></body></html>
